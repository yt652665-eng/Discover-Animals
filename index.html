<!DOCTYPE html>
<html lang="en">

<head>
    <title>Discover Animals</title>
    <meta name="description"
        content="Explore animals from around the world. Learn about their habitat, diet, lifespan, and characteristics using real-time API data.">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/madia.css">
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="container-fluid p-0">
        <div class="row g-0 min-vh-100">
            <div class="col-lg-7 hero-section">
                <div class="overlay d-flex justify-content-center align-items-center h-100">
                    <div class="content text-center text-white">

                        <h1 class="fw-bold animals">Discover Animals</h1>

                        <p class="mt-3 pragraph">
                        <p>
                            Explore animals from around the world with our API-powered search.
                            Learn about <br class="br"> their habitat, diet, lifespan, and more with just one search.
                        </p>
                        </p>

                        <div class="input-group mt-4">
                            <input type="text" class="form-control input" placeholder="Search Animal">
                            <button class="btn btn-dark px-4 search-btn">
                                Enter
                            </button>
                        </div>

                    </div>
                </div>
            </div>

            <div class="col-lg-5 result-section result">
                <div class="d-flex justify-content-center align-items-center h-100">

                </div>
            </div>

        </div>
    </div>


    <script src="./js/index.js"></script>
    <script src="./js/bootstrap.bundle.min.js"></script>
</body>

</html>
